services:
  jenkins:
    container_name: jenkins_container
    image: jenkins/jenkins:latest
    
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    restart: on-failure
    networks:
      - jenkins_network

volumes:
  jenkins_home:

networks:
  jenkins_network:
    ipam:
      driver: default